<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CrossTrain Generator - Test</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #FFFAFA;
      margin: 0;
      padding: 20px;
      color: #312F2F;
    }
    .container {
      max-width: 600px;
      margin: 0 auto;
      text-align: center;
    }
    h1 {
      font-size: 2em;
      margin: 20px 0;
    }
    .button {
      background: #F8A163;
      color: white;
      border: none;
      padding: 15px 30px;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      margin: 10px;
    }
    .button:hover {
      background: #E89250;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>✨ CrossTrain Generator</h1>
    <p>¡La app está funcionando!</p>
    
    <button class="button" onclick="goToHome()">HOME</button>
    <button class="button" onclick="goToTimer()">TIMER</button>
    <button class="button" onclick="goToConverter()">CONVERTER</button>
    <button class="button" onclick="goToCreate()">CREATE TRAINING</button>
    <button class="button" onclick="goToSearch()">SEARCH</button>
  </div>

  <script>
    function goToHome() {
      alert('HOME - Página principal de entrenamientos');
    }
    function goToTimer() {
      alert('TIMER - Entrenador de tiempo');
    }
    function goToConverter() {
      alert('CONVERTER - Convertidor de unidades');
    }
    function goToCreate() {
      alert('CREATE TRAINING - Crear nuevo entrenamiento');
    }
    function goToSearch() {
      alert('SEARCH - Buscar entrenamientos en la base de datos');
    }
  </script>
</body>
</html>
